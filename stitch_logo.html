<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#19e691",
              "background-light": "#f6f8f7",
              "background-dark": "#11211a",
            },
            fontFamily: {
              "display": ["Manrope"],
              "serif-brand": ["Playfair Display"],
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>Turabi Luxury Logo Design</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen flex-col overflow-x-hidden">
<!-- Header / Top Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Brand Identity</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex size-12 cursor-pointer items-center justify-center rounded-full bg-transparent text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">share</span>
</button>
</div>
</div>
<!-- Main Content Area (Logo Showcase) -->
<div class="flex flex-1 flex-col items-center justify-center px-6 py-10">
<!-- Luxury Logo Container -->
<div class="w-full max-w-md aspect-square bg-white rounded-xl shadow-2xl flex flex-col items-center justify-center relative overflow-hidden">
<div class="relative flex flex-col items-end">
<!-- Main Logo Text -->
<div class="flex items-baseline select-none">
<span class="text-black font-serif-brand text-7xl tracking-tight">Tura</span>
<!-- Custom 'b' with Watch Face -->
<div class="relative inline-flex items-center justify-center">
<!-- Lowercase b stem -->
<span class="text-black font-serif-brand text-7xl -mr-1">b</span>
<!-- Watch Face overlaying the loop of the 'b' -->
<div class="absolute bottom-[4px] left-[1px] size-12 rounded-full border-[3px] border-slate-300 bg-emerald-700 shadow-inner flex items-center justify-center overflow-hidden" style="background: radial-gradient(circle, #065f46 0%, #064e3b 100%);">
<!-- Watch Hands -->
<div class="absolute w-0.5 h-4 bg-slate-100 rounded-full origin-bottom bottom-1/2 rotate-[30deg]"></div>
<div class="absolute w-0.5 h-3 bg-slate-100 rounded-full origin-bottom bottom-1/2 -rotate-[110deg]"></div>
<!-- Center Dot -->
<div class="size-1 bg-slate-200 rounded-full z-10"></div>
<!-- Hour Markers -->
<div class="absolute inset-1 border-[1px] border-emerald-500/30 rounded-full"></div>
<!-- Small Crown -->
<div class="absolute -right-0.5 top-1/2 -translate-y-1/2 size-1.5 bg-slate-300 rounded-sm"></div>
</div>
</div>
<span class="text-black font-serif-brand text-7xl">i</span>
<!-- SINCE 2018 Vertical Text -->
<div class="ml-2 flex flex-col justify-center">
<span class="text-[8px] font-bold text-slate-500 tracking-[0.2em] [writing-mode:vertical-lr] uppercase">Since 2018</span>
</div>
</div>
<!-- Tagline -->
<div class="mt-2 mr-6">
<p class="text-slate-600 font-display text-xs font-semibold tracking-widest uppercase">Level up your presence.</p>
</div>
</div>
<!-- Subtle Decorative Element -->
<div class="absolute bottom-4 left-0 right-0 text-center">
<div class="inline-block h-1 w-12 bg-primary rounded-full"></div>
</div>
</div>
<!-- Project Meta Information -->
<div class="mt-12 w-full space-y-6">
<div class="text-center">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">Turabi</h1>
<p class="text-primary font-semibold text-sm mt-1 uppercase tracking-widest">Luxury Watch Collection</p>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-primary/10 dark:bg-primary/5 p-4 rounded-lg border border-primary/20">
<p class="text-slate-500 dark:text-slate-400 text-xs uppercase font-bold">Concept</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium mt-1">Analog Precision</p>
</div>
<div class="bg-primary/10 dark:bg-primary/5 p-4 rounded-lg border border-primary/20">
<p class="text-slate-500 dark:text-slate-400 text-xs uppercase font-bold">Typography</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium mt-1">Playfair Display</p>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="mt-auto border-t border-slate-200 dark:border-primary/20 bg-background-light dark:bg-background-dark px-4 pb-8 pt-2">
<div class="flex gap-2">
<a class="flex flex-1 flex-col items-center justify-end gap-1 rounded-full text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined fill-1">grid_view</span>
</div>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Gallery</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">add_circle</span>
</div>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Create</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">inventory_2</span>
</div>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Assets</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Profile</p>
</a>
</div>
</div>
</div>
</body></html>
